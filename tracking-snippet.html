<script>
(function () {
  var BACKEND = "https://sysgrate-solutions-page-1.onrender.com";   // ← change this

  // Avoid double-counting on rapid re-renders / React HMR
  if (sessionStorage.getItem("sg_tracked")) return;
  sessionStorage.setItem("sg_tracked", "1");

  fetch(BACKEND + "/api/track", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      referrer: document.referrer || "Direct",
      country: "",          // optional: fill via a GeoIP API if needed
    }),
    keepalive: true,        // fires even if user navigates away immediately
  }).catch(function () {});  // silent fail — never block the page
})();
</script>
